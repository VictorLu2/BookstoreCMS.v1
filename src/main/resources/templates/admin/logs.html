<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作紀錄</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- 搜尋和篩選 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <form method="get" action="/admin/logs" class="d-flex">
                            <input type="text" class="form-control me-2" name="keyword" 
                                   th:value="${keyword}" placeholder="搜尋操作內容...">
                            <button class="btn btn-primary" type="submit" aria-label="搜尋">
                                <i class="fas fa-search"></i>
                            </button>
                        </form>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="action">
                            <option value="" th:selected="${(action == null or #strings.isEmpty(action)) and (param.action == null or #strings.isEmpty(param.action))}">所有操作</option>
                            <option value="CREATE" th:selected="${action == 'CREATE' or param.action == 'CREATE'}">新增</option>
                            <option value="UPDATE" th:selected="${action == 'UPDATE' or param.action == 'UPDATE'}">更新</option>
                            <option value="DELETE" th:selected="${action == 'DELETE' or param.action == 'DELETE'}">刪除</option>
                            <option value="ENABLE" th:selected="${action == 'ENABLE' or param.action == 'ENABLE'}">啟用</option>
                            <option value="DISABLE" th:selected="${action == 'DISABLE' or param.action == 'DISABLE'}">停權</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-outline-secondary w-100" onclick="exportLogs()">
                            <i class="fas fa-download"></i> 匯出紀錄
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 操作紀錄列表 -->
        <div class="card" th:with="page=${pageData}, pageNumber=${page.number + 1}, totalPages=${page.totalPages}, size=${page.size}, total=${page.totalElements}">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-history"></i> 操作紀錄</h5>
                <span class="badge bg-primary" th:text="${total + ' 筆紀錄'}">0 筆紀錄</span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>管理員</th>
                                <th>操作</th>
                                <th>目標類型</th>
                                <th>目標ID</th>
                                <th>詳細內容</th>
                                <th>操作時間</th>
                                <!-- 移除最後的 操作 欄（查看按鈕） -->
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="log : ${page.content}">
                                <td th:text="${log.id}">1</td>
                                <td>
                                    <div>
                                        <span th:text="'管理員 ' + ${log.adminId}">管理員 1</span>
                                        <br>
                                        <small class="text-muted" th:text="'ID: ' + ${log.adminId}">ID: 1</small>
                                    </div>
                                </td>
                                <td>
                                    <span th:switch="${log.action}">
                                        <span th:case="'CREATE'" class="badge bg-success">新增</span>
                                        <span th:case="'UPDATE'" class="badge bg-primary">更新</span>
                                        <span th:case="'DELETE'" class="badge bg-danger">刪除</span>
                                        <span th:case="'ENABLE'" class="badge bg-success">啟用</span>
                                        <span th:case="'DISABLE'" class="badge bg-warning">停權</span>
                                        <span th:case="*" class="badge bg-secondary" th:text="${log.action}">操作</span>
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${log.targetType}" class="badge bg-info" th:text="${log.targetType}">BOOK</span>
                                    <span th:unless="${log.targetType}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span th:if="${log.targetId}" th:text="${log.targetId}">123</span>
                                    <span th:unless="${log.targetId}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <div class="text-truncate" style="max-width: 200px;" 
                                         th:text="${log.details != null && !#strings.isEmpty(log.details) ? log.details : '無詳細內容'}">更新書籍資訊</div>
                                </td>
                                <td>
                                    <div>
                                        <small th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd')}">2024-01-01</small>
                                        <br>
                                        <small th:text="${#temporals.format(log.createdAt, 'HH:mm:ss')}">14:30:25</small>
                                    </div>
                                </td>
                                <!-- 移除 查看 按鈕列 -->
                            </tr>
                            <tr th:if="${total == 0}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="fas fa-history fa-3x mb-3"></i>
                                    <p>沒有找到操作紀錄</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分頁列 -->
                <nav th:if="${totalPages > 1}" aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/logs(page=${pageNumber - 1}, size=${size}, keyword=${keyword}, action=${action})}">上一頁</a>
                        </li>
                        <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}" th:classappend="${p == pageNumber} ? 'active'">
                            <a class="page-link" th:text="${p}" th:href="@{/admin/logs(page=${p}, size=${size}, keyword=${keyword}, action=${action})}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/logs(page=${pageNumber + 1}, size=${size}, keyword=${keyword}, action=${action})}">下一頁</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        
        <!-- 移除：紀錄詳情 Modal -->

        <!-- 操作統計 -->
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-history fa-2x text-primary mb-2"></i>
                        <h5 class="card-title" th:text="${logTotal}">0</h5>
                        <p class="card-text text-muted">總紀錄數</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-plus fa-2x text-success mb-2"></i>
                        <h5 class="card-title" th:text="${logCreate}">0</h5>
                        <p class="card-text text-muted">新增操作</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-edit fa-2x text-info mb-2"></i>
                        <h5 class="card-title" th:text="${logUpdate}">0</h5>
                        <p class="card-text text-muted">更新操作</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-trash fa-2x text-danger mb-2"></i>
                        <h5 class="card-title" th:text="${logDelete}">0</h5>
                        <p class="card-text text-muted">刪除操作</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 操作趨勢圖表 -->
        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-chart-line"></i> 操作趨勢</h5>
            </div>
            <div class="card-body" style="height: 300px;">
                <canvas id="operationTrendChart" width="400" height="200"></canvas>
            </div>
        </div>
    </div>

    <div layout:fragment="scripts">
        <!-- Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
        <script th:inline="javascript">
            function exportLogs() {
                alert('匯出紀錄功能開發中...');
            }

            // 讓關鍵字表單提交時保留目前的 action 篩選
            (function() {
                const form = document.querySelector('form[action="/admin/logs"]');
                if (!form) return;
                form.addEventListener('submit', function(e) {
                    const sel = document.querySelector('select[name="action"]');
                    if (!sel) return; // 無選單則走原提交流程
                    e.preventDefault();
                    const url = new URL(form.action, window.location.origin);
                    const fd = new FormData(form);
                    const keyword = (fd.get('keyword') || '').trim();
                    if (keyword) url.searchParams.set('keyword', keyword); else url.searchParams.delete('keyword');
                    if (sel.value) url.searchParams.set('action', sel.value); else url.searchParams.delete('action');
                    url.searchParams.set('page', '1');
                    window.location.href = url.toString();
                });
            })();

            // 操作篩選：變更即更新 URL 並回到第 1 頁
            (function() {
                const actionSel = document.querySelector('select[name="action"]');
                if (!actionSel) return;
                actionSel.addEventListener('change', function() {
                    const url = new URL(window.location);
                    if (this.value) url.searchParams.set('action', this.value); else url.searchParams.delete('action');
                    url.searchParams.set('page', '1');
                    window.location.href = url.toString();
                });
            })();

            // 操作趨勢圖表（使用後端資料）
            document.addEventListener('DOMContentLoaded', function() {
                const canvas = document.getElementById('operationTrendChart');
                if (!canvas || !window.Chart) return;
                const ctx = canvas.getContext('2d');

                const trend = /*[[${trend}]]*/ {labels: ['1月','2月','3月','4月','5月','6月'], create:[0,0,0,0,0,0], update:[0,0,0,0,0,0], delete:[0,0,0,0,0,0]};

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trend.labels,
                        datasets: [{
                            label: '新增操作',
                            data: trend.create,
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40, 167, 69, 0.1)',
                            tension: 0.4,
                            fill: true
                        }, {
                            label: '更新操作',
                            data: trend.update,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            tension: 0.4,
                            fill: true
                        }, {
                            label: '刪除操作',
                            data: trend.delete,
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'top' } },
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: '操作次數' } },
                            x: { title: { display: true, text: '月份' } }
                        }
                    }
                });
            });
        </script>
    </div>
</body>
</html>
