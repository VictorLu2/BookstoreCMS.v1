<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head>
    <title>儀表板</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- 頁面標題 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-tachometer-alt"></i> 管理儀表板</h2>
        </div>

        <!-- 統計卡片 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-shopping-cart fa-3x text-primary mb-3"></i>
                        <h4 class="card-title" th:text="${monthlyStats?.orderCount ?: 0}">0</h4>
                        <p class="card-text text-muted">本月訂單數</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-dollar-sign fa-3x text-success mb-3"></i>
                        <h4 class="card-title" th:text="${'$' + (monthlySalesYuan ?: 0)}">$0</h4>
                        <p class="card-text text-muted">本月銷售額</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-users fa-3x text-info mb-3"></i>
                        <h4 class="card-title" th:text="${userStats?.totalUsers ?: 0}">0</h4>
                        <p class="card-text text-muted">總會員數</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <i class="fas fa-book fa-3x text-warning mb-3"></i>
                        <h4 class="card-title" th:text="${bookCount}">0</h4>
                        <p class="card-text text-muted">總書籍數</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 圖表區域 -->
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-line"></i> 銷售趨勢</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="salesChart" height="100"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-pie"></i> 訂單狀態分佈</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="orderStatusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <div layout:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            // 從後端注入資料
            const salesLabels = /*[[${salesLabels}]]*/ [];
            const salesData = /*[[${salesData}]]*/ [];
            const statusLabels = /*[[${orderStatusLabels}]]*/ [];
            const statusData = /*[[${orderStatusData}]]*/ [];

            // 銷售趨勢圖表（金額單位：元、整數）
            const salesCtx = document.getElementById('salesChart').getContext('2d');
            new Chart(salesCtx, {
                type: 'line',
                data: {
                    labels: salesLabels,
                    datasets: [{
                        label: '銷售額（元）',
                        data: salesData,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.1)',
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 訂單狀態分佈圖表（本月）
            const orderCtx = document.getElementById('orderStatusChart').getContext('2d');
            new Chart(orderCtx, {
                type: 'doughnut',
                data: {
                    labels: statusLabels,
                    datasets: [{
                        data: statusData,
                        backgroundColor: [
                            'rgb(40, 167, 69)',
                            'rgb(255, 193, 7)',
                            'rgb(220, 53, 69)',
                            'rgb(23, 162, 184)',
                            'rgb(108, 117, 125)'
                        ]
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        </script>
    </div>
</body>
</html>
