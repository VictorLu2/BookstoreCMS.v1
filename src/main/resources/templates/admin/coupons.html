<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優惠券管理</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- 搜尋和篩選 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <form method="get" action="/admin/coupons" class="d-flex">
                            <input type="text" class="form-control me-2" name="keyword" 
                                   th:value="${keyword}" placeholder="搜尋優惠券名稱或代碼...">
                            <button class="btn btn-primary" type="submit" aria-label="搜尋">
                                <i class="fas fa-search"></i>
                            </button>
                        </form>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="status">
                            <option value="" th:selected="${status == null or #strings.isEmpty(status)}">所有狀態</option>
                            <option value="DRAFT" th:selected="${status == 'DRAFT'}">草稿</option>
                            <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">啟用</option>
                            <option value="PAUSED" th:selected="${status == 'PAUSED'}">暫停</option>
                            <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">已過期</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <a href="/admin/coupons/new" class="btn btn-success w-100">
                            <i class="fas fa-plus"></i> 新增優惠券
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 優惠券列表 -->
        <div class="card" th:with="page=${pageData}, total=${page.totalElements}, pageNumber=${page.number + 1}, totalPages=${page.totalPages}, size=${page.size}">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-ticket-alt"></i> 優惠券列表</h5>
                <span class="badge bg-primary" th:text="${total + ' 張優惠券'}">0 張優惠券</span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名稱</th>
                                <th>代碼</th>
                                <th>折扣類型</th>
                                <th>折扣值</th>
                                <th>最低消費</th>
                                <th>有效期</th>
                                <th>狀態</th>
                                <th>使用限制</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="coupon : ${page.content}">
                                <td th:text="${coupon.id}">1</td>
                                <td>
                                    <strong th:text="${coupon.name}">優惠券名稱</strong>
                                </td>
                                <td>
                                    <code th:text="${coupon.genericCode ?: 'N/A'}">COUPON123</code>
                                </td>
                                <td>
                                    <span th:switch="${coupon.discountType}">
                                        <span th:case="'PERCENT'" class="badge bg-info">百分比</span>
                                        <span th:case="'FIXED'" class="badge bg-success">固定金額</span>
                                        <span th:case="*" class="badge bg-secondary" th:text="${coupon.discountType}">類型</span>
                                    </span>
                                </td>
                                <td>
                                    <span th:switch="${coupon.discountType}">
                                        <span th:case="'PERCENT'" th:text="${#numbers.formatInteger(coupon.discountValue, 0) + '%'}">10%</span>
                                        <span th:case="'FIXED'" th:text="${'$' + #numbers.formatInteger(coupon.discountValue, 0)}">$50</span>
                                        <span th:case="*" th:text="${coupon.discountValue != null ? #numbers.formatInteger(coupon.discountValue, 0) : '-'}">0</span>
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${coupon.minSpendAmount}" th:text="${'$' + coupon.minSpendAmount}">$100</span>
                                    <span th:unless="${coupon.minSpendAmount}" class="text-muted">無限制</span>
                                </td>
                                <td>
                                    <div>
                                        <small th:text="${#temporals.format(coupon.startsAt, 'yyyy-MM-dd')}">2024-01-01</small>
                                        <br>
                                        <small th:text="${#temporals.format(coupon.endsAt, 'yyyy-MM-dd')}">2024-12-31</small>
                                    </div>
                                </td>
                                <td>
                                    <span th:switch="${coupon.status}">
                                        <span th:case="'DRAFT'" class="badge bg-secondary">草稿</span>
                                        <span th:case="'ACTIVE'" class="badge bg-success">啟用</span>
                                        <span th:case="'PAUSED'" class="badge bg-warning">暫停</span>
                                        <span th:case="'EXPIRED'" class="badge bg-danger">已過期</span>
                                        <span th:case="*" class="badge bg-secondary" th:text="${coupon.status}">狀態</span>
                                    </span>
                                </td>
                                <td>
                                    <div>
                                        <small th:if="${coupon.totalUsageLimit}" 
                                               th:text="'總限: ' + coupon.totalUsageLimit">總限: 1000</small>
                                        <small th:unless="${coupon.totalUsageLimit}" class="text-muted">總限: 無</small>
                                        <br>
                                        <small th:if="${coupon.perUserLimit}" 
                                               th:text="'每人: ' + coupon.perUserLimit">每人: 1</small>
                                        <small th:unless="${coupon.perUserLimit}" class="text-muted">每人: 無</small>
                                    </div>
                                </td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/admin/coupons/{id}/edit(id=${coupon.id})}" 
                                           class="btn btn-primary btn-sm">
                                            <i class="fas fa-edit"></i> 編輯
                                        </a>
                                        <button class="btn btn-danger btn-sm" 
                                                th:onclick="'deleteCoupon(' + ${coupon.id} + ')'">
                                            <i class="fas fa-trash"></i> 刪除
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${total == 0}">
                                <td colspan="10" class="text-center text-muted py-4">
                                    <i class="fas fa-ticket-alt fa-3x mb-3"></i>
                                    <p>沒有找到優惠券資料</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分頁列 -->
                <nav th:if="${totalPages > 1}" aria-label="Page navigation">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/coupons(page=${pageNumber - 1}, size=${size}, keyword=${keyword}, status=${status})}">上一頁</a>
                        </li>
                        <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}" th:classappend="${p == pageNumber} ? 'active'">
                            <a class="page-link" th:text="${p}" th:href="@{/admin/coupons(page=${p}, size=${size}, keyword=${keyword}, status=${status})}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/coupons(page=${pageNumber + 1}, size=${size}, keyword=${keyword}, status=${status})}">下一頁</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
    
    <div layout:fragment="scripts">
        <script>
            // CSRF 參數（由 layout.html 提供 meta）
            const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
            const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
            const CSRF_TOKEN = csrfTokenMeta ? csrfTokenMeta.getAttribute('content') : null;
            const CSRF_HEADER = csrfHeaderMeta ? csrfHeaderMeta.getAttribute('content') : null;

            function deleteCoupon(couponId) {
                if (confirm('確定要刪除這張優惠券嗎？此操作無法復原。')) {
                    const headers = {};
                    if (CSRF_TOKEN && CSRF_HEADER) { headers[CSRF_HEADER] = CSRF_TOKEN; }
                    fetch(`/admin/coupons/${couponId}/delete`, {
                        method: 'POST',
                        headers
                    })
                    .then(response => response.text())
                    .then(result => {
                        if (result === 'success') { alert('優惠券已成功刪除'); location.reload(); }
                        else { alert('刪除失敗：' + result); }
                    })
                    .catch(error => { console.error('Error:', error); alert('刪除失敗，請稍後再試'); });
                }
            }
            document.addEventListener('DOMContentLoaded', function() {
                const sel = document.querySelector('select[name="status"]');
                if (sel) {
                    sel.addEventListener('change', function() {
                        const url = new URL(window.location);
                        if (this.value) url.searchParams.set('status', this.value); else url.searchParams.delete('status');
                        window.location.href = url.toString();
                    });
                }
            });
        </script>
    </div>
</body>
</html>
